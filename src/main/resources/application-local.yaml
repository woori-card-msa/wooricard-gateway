# =============================================
# 로컬 테스트용 프로파일 (Eureka 없이 정적 IP 라우팅)
# 실행 방법: --spring.profiles.active=local
# =============================================

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: approval-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/approval/**

            - id: settlement-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/settlement/**

            - id: billing-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/billing/**

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
