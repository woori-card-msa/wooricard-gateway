# =============================================
# 운영/통합 프로파일 (Eureka 서비스 디스커버리 사용)
# 실행 방법: 프로파일 지정 없이 그냥 실행
# =============================================

server:
  port: 8080

spring:
  application:
    name: wooricard-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # 승인/결제 서비스(8081) — Eureka 서비스명: wooricard-approval-service
            - id: wooricard-approval-service
              uri: lb://wooricard-approval-service
              predicates:
                - Path=/api/authorizations,/api/authorizations/**,/api/authorization/**,/api/health

            # 정산 서비스(8082) — Eureka 서비스명: wooricard-settlement-service
            - id: wooricard-settlement-service
              uri: lb://wooricard-settlement-service
              predicates:
                - Path=/api/settlements/**

            # 매입 청구 서비스(8083) — Eureka 서비스명: wooricard-billing-service
            - id: wooricard-billing-service
              uri: lb://wooricard-billing-service
              predicates:
                - Path=/api/billing/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"

eureka:
  client:
    service-url:
      # TODO: 유레카 서버 IP - 와이파이 환경 변경 시 이 주소를 수정해야 함
      defaultZone: http://192.168.1.80:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    should-enforce-registration-at-init: false
  instance:
    ip-address: 192.168.1.249
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

jwt:
  secret: wooricard-gateway-jwt-secret-key-must-be-at-least-32-characters
  expiration-ms: 3600000  # 1시간
  client:
    id: vensa
    secret: vensa-secret-2026
