# =============================================
# 운영/통합 프로파일 (Eureka 서비스 디스커버리 사용)
# 실행 방법: 프로파일 지정 없이 그냥 실행
# =============================================

server:
  port: 8080

spring:
  application:
    name: wooricard-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # 승인/결제 서비스
            - id: approval-service
              uri: lb://approval-service          # Eureka 없을 시: uri: http://localhost:8081
              predicates:
                - Path=/api/approval/**

            # 정산 서비스
            - id: settlement-service
              uri: lb://settlement-service        # Eureka 없을 시: uri: http://localhost:8082
              predicates:
                - Path=/api/settlement/**

            # 매입 청구 서비스
            - id: billing-service
              uri: lb://billing-service           # Eureka 없을 시: uri: http://localhost:8083
              predicates:
                - Path=/api/billing/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    should-enforce-registration-at-init: false

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
